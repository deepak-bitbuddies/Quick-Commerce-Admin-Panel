services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps # dev-only stage: has devDependencies + tsx for hot-reload
    working_dir: /app
    command: npm run dev
    ports:
      - "${PORT:-4000}:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      HOST: 0.0.0.0
      MONGO_URI: ${MONGO_URI:-mongodb://mongo:27017/quick_commerce}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-only-insecure-secret-change-me-please}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: "*"
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - app_node_modules:/app/node_modules # keep container's own install
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: quick_commerce
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # AOF persistence enabled so the atomic stock counters and rider geo
    # index survive a container restart instead of resetting to empty.
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
  app_node_modules:
